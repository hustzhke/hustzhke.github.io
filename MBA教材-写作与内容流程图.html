<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBA教材写作与内容流程图</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper: #faf7f2;
      --color-paper-2: #f2ede4;
      --color-ink: #1c1917;
      --color-muted: #57534e;
      --color-soft: #78716c;
      --color-rule: rgba(28, 25, 23, 0.12);
      --color-rule-solid: rgba(120, 113, 108, 0.25);
      --color-accent: #b5523a;
      --color-accent-tint: rgba(181, 82, 58, 0.08);
      --font-sans: 'Geist', system-ui, sans-serif;
      --font-serif: 'Instrument Serif', serif;
      --font-mono: 'Geist Mono', ui-monospace, monospace;
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }

    .frame {
      width: 100%;
      max-width: 1240px;
    }

    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.7rem, 2.3vw + 0.9rem, 2.4rem);
      font-weight: 400;
      line-height: 1.12;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
      color: var(--color-ink);
    }

    svg {
      width: 100%;
      min-width: 980px;
      display: block;
    }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Flowchart · Diagram Design</p>
    <h1>MBA教材的写作与内容流程</h1>

    <svg viewBox="0 0 1120 840" xmlns="http://www.w3.org/2000/svg" aria-labelledby="title desc" role="img">
      <title id="title">MBA教材的写作与内容流程图</title>
      <desc id="desc">展示 MBA 教材从目标界定、框架设计、内容审查、章节写作、教学表达优化到定稿交付的流程图。</desc>

      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)" />
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#57534e" />
        </marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#b5523a" />
        </marker>
      </defs>

      <rect width="100%" height="100%" fill="#faf7f2" />
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6" />

      <rect x="24" y="24" width="1072" height="716" rx="8" fill="#f2ede4" stroke="rgba(28,25,23,0.12)" stroke-width="1" />

      <!-- Arrows -->
      <line x1="560" y1="116" x2="560" y2="152" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)" />
      <line x1="560" y1="216" x2="560" y2="252" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)" />
      <line x1="560" y1="316" x2="560" y2="352" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)" />

      <line x1="660" y1="400" x2="816" y2="400" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)" />
      <line x1="916" y1="400" x2="980" y2="400" stroke="#57534e" stroke-width="1.2" />
      <line x1="980" y1="400" x2="980" y2="500" stroke="#57534e" stroke-width="1.2" />
      <line x1="980" y1="500" x2="560" y2="500" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)" />

      <line x1="560" y1="448" x2="560" y2="484" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)" />
      <line x1="560" y1="548" x2="560" y2="584" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)" />

      <line x1="660" y1="632" x2="816" y2="632" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)" />
      <line x1="916" y1="632" x2="980" y2="632" stroke="#57534e" stroke-width="1.2" />
      <line x1="980" y1="632" x2="980" y2="712" stroke="#57534e" stroke-width="1.2" />
      <line x1="980" y1="712" x2="560" y2="712" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)" />

      <line x1="560" y1="680" x2="560" y2="716" stroke="#b5523a" stroke-width="1.4" marker-end="url(#arrow-accent)" />

      <!-- Arrow labels -->
      <rect x="724" y="390" width="28" height="12" rx="2" fill="#faf7f2" />
      <text x="738" y="399" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.12em">NO</text>

      <rect x="544" y="458" width="32" height="12" rx="2" fill="#faf7f2" />
      <text x="560" y="467" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.12em">YES</text>

      <rect x="724" y="622" width="28" height="12" rx="2" fill="#faf7f2" />
      <text x="738" y="631" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.12em">NO</text>

      <rect x="544" y="690" width="32" height="12" rx="2" fill="#faf7f2" />
      <text x="560" y="699" fill="#b5523a" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.12em">YES</text>

      <!-- Nodes -->
      <rect x="452" y="60" width="216" height="56" rx="28" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.30)" stroke-width="1" />
      <text x="560" y="92" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">确定教材定位与读者</text>
      <text x="560" y="108" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">MBA / 管理学员 / 课程配套</text>

      <rect x="444" y="152" width="232" height="64" rx="6" fill="#ffffff" stroke="#1c1917" stroke-width="1" />
      <text x="560" y="184" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">明确教学目标与能力要求</text>
      <text x="560" y="200" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">知识点 / 案例深度 / 章节成果</text>

      <rect x="444" y="252" width="232" height="64" rx="6" fill="#ffffff" stroke="#1c1917" stroke-width="1" />
      <text x="560" y="284" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">设计全书结构与章节框架</text>
      <text x="560" y="300" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">导入 / 理论 / 工具 / 案例 / 练习</text>

      <polygon points="560,352 660,400 560,448 460,400" fill="#ffffff" stroke="#1c1917" stroke-width="1" />
      <text x="560" y="396" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">核心内容是否完整覆盖</text>
      <text x="560" y="410" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">MBA课程目标？</text>

      <rect x="816" y="368" width="100" height="64" rx="6" fill="rgba(28,25,23,0.02)" stroke="rgba(28,25,23,0.20)" stroke-dasharray="4,3" stroke-width="1" />
      <text x="866" y="394" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">补充理论</text>
      <text x="866" y="408" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">案例与数据</text>
      <text x="866" y="424" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">gap review</text>

      <rect x="436" y="484" width="248" height="64" rx="6" fill="#ffffff" stroke="#1c1917" stroke-width="1" />
      <text x="560" y="516" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">撰写章节正文与配套栏目</text>
      <text x="560" y="532" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">概念阐释 / 图表 / 讨论题 / 教学提示</text>

      <polygon points="560,584 660,632 560,680 460,632" fill="#ffffff" stroke="#1c1917" stroke-width="1" />
      <text x="560" y="628" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">表达是否兼顾清晰性</text>
      <text x="560" y="642" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">与课堂可用性？</text>

      <rect x="816" y="600" width="100" height="64" rx="6" fill="rgba(28,25,23,0.02)" stroke="rgba(28,25,23,0.20)" stroke-dasharray="4,3" stroke-width="1" />
      <text x="866" y="626" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">调整语言</text>
      <text x="866" y="640" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">练习与图示</text>
      <text x="866" y="656" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">teaching pass</text>

      <rect x="436" y="716" width="248" height="64" rx="28" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1" />
      <text x="560" y="748" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">定稿、审校与课程交付</text>
      <text x="560" y="764" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">讲义同步 / PPT衔接 / 版本发布</text>

      <!-- Legend -->
      <line x1="40" y1="792" x2="1080" y2="792" stroke="rgba(28,25,23,0.10)" stroke-width="0.8" />
      <text x="40" y="808" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND · SHAPE CARRIES TYPE</text>

      <rect x="40" y="818" width="24" height="12" rx="6" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.30)" stroke-width="1" />
      <text x="74" y="828" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">起点 / 终点</text>

      <rect x="184" y="818" width="24" height="12" rx="2" fill="#ffffff" stroke="#1c1917" stroke-width="1" />
      <text x="218" y="828" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">写作步骤</text>

      <polygon points="352,824 364,818 376,824 364,830" fill="#ffffff" stroke="#1c1917" stroke-width="1" />
      <text x="410" y="828" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">质量判断</text>

      <rect x="530" y="818" width="24" height="12" rx="2" fill="rgba(28,25,23,0.02)" stroke="rgba(28,25,23,0.20)" stroke-dasharray="4,3" stroke-width="1" />
      <text x="592" y="828" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">返工补充</text>

      <line x1="734" y1="826" x2="764" y2="826" stroke="#b5523a" stroke-width="1.4" marker-end="url(#arrow-accent)" />
      <text x="810" y="828" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">主流程 / 通过</text>

      <line x1="930" y1="826" x2="960" y2="826" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)" />
      <text x="1000" y="828" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">检查分支</text>
    </svg>
  </div>
</body>
</html>
